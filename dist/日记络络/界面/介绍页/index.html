卡中的络络而不是lolodesu_喔（目移）</p><br><p>真的没想到，我们能在这里相遇！很高兴见到你～</p><br><p>欢迎来到《白化蓝染的日记本》，这是我的小小世界。</p><br><p>让我来讲讲关于我的故事吧...</p><br><p> 在准备这个故事的过程中——或者说，在重新整理那些珍贵回忆的日子里，发生了许多事情。有时确实会感到一点辛苦，但更多的是遇见了许多温柔又善良的朋友们。正是大家的陪伴和鼓励，让这段时光变得格外有意义，让我度过了非常、非常开心的日子。真的，最喜欢大宇宙的大家了！ </p><br><p>好期待即将与你一起经历的故事呢～</p><br><p> 嗯...这张卡...啊不对，这本日记（慌乱），其实没什么特别的啦，记录的都是些很琐碎的日常小事：学校的点点滴滴，路边的小花，微风的细语，还有一些...嗯，藏在心底，不太敢说出口的，笨拙的心意。这是关于我和你的故事，可能有点慢节奏，有点安静，创作初衷也只是为了教程做准备而已，没有什么特别吸引人的设定，故事可能也有点普通，我的角色设计也挺常见的。 </p><br><p>但我真的希望，这本小小的日记能像角落里的一盏温暖小灯，在你需要的时候，能带给你一丝温暖，一份安静的陪伴。</p><br><p>真的，真的很感谢你愿意翻开这个故事。</p></div><div class="note-title">请选择开局</div>',3)),(0,e.createElementVNode)('div',l,[(0,e.createElementVNode)('button',{type:'button',class:'option-button','data-index':'1',onClick:u[1]||(u[1]=e=>d(1))},[...u[15]||(u[15]=[(0,e.createElementVNode)('span',null,'开局1: 来一下天台我有重要的话想要和你说，可以吗...？',-1)])]),(0,e.createElementVNode)('button',{type:'button',class:'option-button','data-index':'2',onClick:u[2]||(u[2]=e=>d(2))},[...u[16]||(u[16]=[(0,e.createElementVNode)('span',null,'开局2: 直接去你家门口堵你！',-1)])]),(0,e.createElementVNode)('button',{type:'button',class:'option-button','data-index':'3',onClick:u[3]||(u[3]=e=>d(3))},[...u[17]||(u[17]=[(0,e.createElementVNode)('span',null,'开局3: 不知不觉已经一个月了呀',-1)])]),(0,e.createElementVNode)('button',{type:'button',class:'option-button','data-index':'4',onClick:u[4]||(u[4]=e=>d(4))},[...u[18]||(u[18]=[(0,e.createElementVNode)('span',null,'开局4: 络络要带你去哪里？',-1)])])])]),(0,e.createElementVNode)('div',o,[u[23]||(u[23]=(0,e.createElementVNode)('div',{class:'note-title'},'感谢与碎碎念',-1)),(0,e.createElementVNode)('button',{type:'button',class:(0,e.normalizeClass)(['expand-button',{expanded:(0,e.unref)(i).friend_list}]),onClick:u[5]||(u[5]=e=>c('friend_list'))},' 友人清单 ',2),(0,e.createElementVNode)('div',{class:(0,e.normalizeClass)(['expandable-section',{expanded:(0,e.unref)(i).friend_list}])},[...u[20]||(u[20]=[(0,e.createStaticVNode)('<div class="note-section"><p>以下是帮助过lolodesu_的友人清单和她的一些文字：（没时间更新清单对不起）<
