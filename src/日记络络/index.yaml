扩展字段:
  正则:
    - 正则名称: '[折叠]变量更新中'
      id: 1c2cef46-b544-43b4-a252-a119c75b0238
      启用: true
      查找表达式: /<(update(?:variable)?)>(?!.*<\/\1>)\s*((?:(?!<\1>).)*)\s*$/gsi
      替换为: |-


        <details>
        <summary>变量更新中{{random::.::..::...}}</summary>
        $2
        </details>
      来源:
        用户输入: true
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

    - 正则名称: '[折叠]完整变量更新'
      id: 5371caea-a89e-427a-8721-b77a87824097
      启用: true
      查找表达式: /<(update(?:variable)?)>\s*((?:(?!<\1>).)*)\s*<\/\1>/gsi
      替换为: |-


        <details>
        <summary>变量更新情况</summary>
        $2
        </details>
      来源:
        用户输入: true
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

    - 正则名称: '[不发送]去除变量更新'
      id: 2d18a149-0c6c-40d8-a09a-03cfd2bf678e
      启用: true
      查找表达式: /<(update(?:variable)?)>(?:(?!.*<\/\1>)(?:(?!<\1>).)*$|(?:(?!<\1>).)*<\/\1?>)/gsi
      替换为: ''
      来源:
        用户输入: true
        AI输出: true
      作用于:
